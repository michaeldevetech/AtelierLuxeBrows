        "@type": "ContactPoint",

        "availableLanguage": ["Spanish","English"]

        "potentialAction": {
        "@type": "ReserveAction",
        "target": {
        "@type": "EntryPoint",

<body>
    <header>
        <a href="../index.html">
        <img src="../assets/Logo/a-l-l-logo.png" alt="Atelier Luxe Brows Logo" class="logo-header">

    <main>
        <form action="submit" method="post" class="grid-container">
            <div class="infodecliente">
                <label for="name" class="agendacita">Nombre de Reservacion</label>
                <input type="text" id="name" class="agendacita" name="name"><br></br>

                <label for="tel" class="agendacita">Numero de Telefono</label>
                <input type="tel" id="tel" class="agendacita" name="tel"><br></br>

                <label for="email" class="agendacita">Correo Electronico</label>
                <input type="email" id="email" class="agendacita" name="email"><br></br>
            </div>
            <div class="infodefecha">
                <label for="date" class="agendacita">Elige un Dia</label>
                <input type="date" id="date" class="agendacita" name="date"><br></br>

                <label for="time" class="agendacita">Elije un Tiempo</label>
                <input type="time" id="time" class="agendacita" name="time"><br></br>
            </div> 
            <br>
            <button type="submit" class="agendacita" id="submitbutton">Reserva tu Cita</button>
        </form>
    </main>
