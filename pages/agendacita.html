                <label for="email" class="agendacita">Correo Electronico</label>
                <input type="email" id="email" class="agendacita" name="email"><br></br>
            </div>
            <div class="infodefecha">
                <label for="date" class="agendacita">Elige un Dia</label>
                <input type="date" id="date" class="agendacita" name="date"><br></br>

                <label for="time" class="agendacita">Elije un Tiempo</label>
                <input type="time" id="time" class="agendacita" name="time"><br></br>
            </div> 
        <br>
        <button type="submit" class="agendacita" id="submitbutton">Reserva tu Cita</button>
